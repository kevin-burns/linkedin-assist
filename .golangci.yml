version: "2"

linters:
  enable:
    - gosec
    - errcheck
    - govet
    - staticcheck

  settings:
    gosec:
      # These rules are confirmed false positives for a local, single-user,
      # read-only CLI. Each was investigated and the code hardened where a real
      # fix existed (e.g. the Ollama probe now validates the URL and uses a
      # context) -- they are excluded here because gosec cannot model "operator-
      # configured local tool", not to silence an un-triaged finding. Excluding
      # them centrally (vs. scattering //nosec pragmas) keeps the rationale in
      # one auditable place. The rules stay enabled for all other code.
      excludes:
        # G304 (file path from a variable): every config-file read trips this --
        # credentials.json, config.json, usage.json, excluded-companies.txt, the
        # job cache, and the user-supplied --connections CSV. Paths come from
        # os.UserHomeDir()+fixed sub-paths or an explicit user flag, never from
        # untrusted request data; hardcoding them is impossible (XDG, --connections).
        - G304
        # G404 (weak RNG): math/rand drives only the rate-limiter's jitter
        # (human-like pacing of LinkedIn calls), nothing security-sensitive.
        - G404
        # G204 (subprocess from a variable): the one exec is
        # exec.Command(exec.LookPath("ollama"), "serve") -- a PATH-resolved
        # trusted binary with a fixed arg. Launching a PATH binary requires a
        # variable; this is the safe pattern, not command injection.
        - G204
        # G704 (SSRF via taint): the Ollama probe targets LI_ASSIST_OLLAMA_HOST,
        # an operator-set local-daemon URL -- not request data. The host is
        # url.Parse'd and scheme-validated (http/https only) before use, but
        # gosec flags any env-derived value reaching an HTTP client. False
        # positive for a local CLI talking to a user-configured local service.
        - G704

  exclusions:
    rules:
      # Test files: ignore errcheck (os.Setenv/Unsetenv return values are
      # irrelevant in test setup) and gosec (test fixtures are not production
      # security boundaries).
      - linters: [errcheck, gosec]
        path: _test\.go$
      # fmt.Fprintln/Fprintf to os.Stdout/os.Stderr is the intended output
      # sink in CLI commands -- not an error path. Same pattern as ogham-cli.
      - linters: [errcheck]
        text: "fmt.Fprint"
    paths:
      - vendor
