name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.26']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Architecture gate
        run: make check-deps

      - name: Tests with race detector
        run: go test -race ./...

      - name: Build
        run: make build

  lint-security:
    name: lint + security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      - name: gosec (Go SAST)
        # Exclude set MUST match .golangci.yml gosec.excludes + the Makefile
        # (see .golangci.yml for the per-rule false-positive rationale).
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -quiet -exclude=G104,G204,G304,G704 ./...

      - name: govulncheck (known CVEs)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
